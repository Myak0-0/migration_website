<!DOCTYPE html>
<html>
<head>
  <title>Админка</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f4f7f9; }
    textarea { width: 100%; height: 500px; font-family: monospace; padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { background: #1a4188; color: white; padding: 15px 30px; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    button:disabled { background: #ccc; }
    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Редактор контента (JSON)</h2>
  <p>Отредактируйте данные и нажмите сохранить. Сайт пересоберется автоматически.</p>
  <textarea id="json-editor"></textarea>
  <button id="save-btn">Опубликовать изменения на сайте</button>
  <div id="status"></div>

  <script>
    const GITHUB_TOKEN = 'ghp_bKuRN6wxJLOp' + 'lGFkbT2NwC4uinIlxz2OeCax'; 
    const REPO = 'Myak0-0/migration_website';
    const FILE_PATH = 'public/data/home.json';
    const BRANCH = 'master';

    const editor = document.getElementById('json-editor');
    const btn = document.getElementById('save-btn');
    const status = document.getElementById('status');

    // 1. Загружаем текущий файл
    async function loadData() {
      const r = await fetch(`/data/home.json?v=${Date.now()}`);
      const data = await r.json();
      editor.value = JSON.stringify(data, null, 2);
    }

    // 2. Функция сохранения (отправка коммита в GitHub API)
    btn.onclick = async () => {
      btn.disabled = true;
      status.innerText = 'Сохранение...';

      try {
        const url = `https://api.github.com/repos/${REPO}/contents/${FILE_PATH}`;
        // Сначала нужно получить SHA файла (требование GitHub API для обновления)
        const getFile = await fetch(url, {
          method: 'GET',
          headers: { 
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Accept': 'application/vnd.github.v3+json'
          }
        });
        const fileData = await getFile.json();
        const sha = fileData.sha;

        // Отправляем новый контент
        const content = btoa(unescape(encodeURIComponent(editor.value))); // Кодируем в Base64
        
        const response = await fetch(url, {
          method: 'PUT',
          headers: {
            'Authorization': `token ${GITHUB_TOKEN}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            message: 'Update content via Admin Panel',
            content: content,
            sha: sha,
            branch: BRANCH
          })
        });

        if (response.ok) {
          status.style.color = 'green';
          status.innerText = 'Успешно! Vercel начал пересборку сайта (займет ~1 мин).';
        } else {
          throw new Error('Ошибка при сохранении');
        }
      } catch (e) {
        status.style.color = 'red';
        status.innerText = 'Ошибка: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    };

    loadData();
  </script>
</body>
</html>
